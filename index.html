<script>
  /* CONFIG: Paste your link here. 
     - It can be a Google Sheets CSV URL
     - Or a path to a local file like 'jobs.json' 
  */
  const DATA_SOURCE = "jobs.json"; 

  let allJobs = [], activeFilter = "all", searchVal = "", sortVal = "newest";

  const LOGO_COLORS = {
    default: { bg: "#EEEDFE", text: "#3C3489" },
    google: { bg: "#E6F1FB", text: "#185FA5" },
    amazon: { bg: "#FAEEDA", text: "#854F0B" },
    tcs: { bg: "#E6F1FB", text: "#0C447C" }
  };

  async function init() {
    try {
      const res = await fetch(DATA_SOURCE);
      if (!res.ok) throw new Error("Fetch failed");

      // Check if the data is JSON or CSV based on the URL or content-type
      const contentType = res.headers.get("content-type");
      if (DATA_SOURCE.endsWith(".json") || (contentType && contentType.includes("application/json"))) {
        allJobs = await res.json();
      } else {
        const text = await res.text();
        allJobs = parseCSV(text);
      }

      document.getElementById("last-updated").textContent = "Live Updates Active";
      render();
    } catch (e) {
      console.error(e);
      document.getElementById("grid").innerHTML = `
        <div style="grid-column:1/-1; text-align:center;">
          <p>⚠️ Could not load data from source.</p>
          <button onclick="location.reload()" style="margin-top:10px; padding:8px 16px; border-radius:8px; border:1px solid #ddd; cursor:pointer;">Retry</button>
        </div>`;
    }
  }

  function parseCSV(text) {
    const lines = text.trim().split("\n");
    if (lines.length === 0) return [];
    const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/"/g, ''));
    return lines.slice(1).map(line => {
      // Regex to properly handle commas inside quoted strings in CSV
      const cols = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
      const obj = {};
      headers.forEach((h, i) => {
        obj[h] = (cols[i] || "").replace(/^"|"$/g, "").trim();
      });
      return obj;
    }).filter(j => j.title);
  }

  function daysLeft(d) {
    if (!d) return 999;
    const diff = new Date(d) - new Date();
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
  }

  function getLogoColor(org) {
    const k = (org || "").toLowerCase();
    for (let key in LOGO_COLORS) { if (k.includes(key)) return LOGO_COLORS[key]; }
    return LOGO_COLORS.default;
  }

  function render() {
    let filtered = allJobs.filter(j => {
      const matchType = activeFilter === "all" || j.type === activeFilter;
      const matchSearch = [j.title, j.org, j.skills].join(" ").toLowerCase().includes(searchVal.toLowerCase());
      return matchType && matchSearch;
    });

    // Sorting Logic
    filtered.sort((a, b) => {
      if (sortVal === "deadline") return daysLeft(a.deadline) - daysLeft(b.deadline);
      if (sortVal === "title") return a.title.localeCompare(b.title);
      if (sortVal === "stipend") {
        const getVal = s => parseInt(s.replace(/[^0-9]/g, '')) || 0;
        return getVal(b.stipend) - getVal(a.stipend);
      }
      return 0; 
    });

    if (sortVal === "newest") filtered.reverse();

    const grid = document.getElementById("grid");
    if (!filtered.length) {
      grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">No matches found for "${searchVal}".</div>`;
      return;
    }

    grid.innerHTML = filtered.map((j, i) => {
      const lc = getLogoColor(j.org);
      const dl = daysLeft(j.deadline);
      const tags = (j.skills || "").split(",").slice(0, 3).map(s => `<span class="tag">${s.trim()}</span>`).join("");
      
      return `
        <div class="card" onclick="openModal(${allJobs.indexOf(j)})">
          <div class="card-header">
            <div class="org-logo" style="background:${lc.bg};color:${lc.text}">${(j.org || "?")[0].toUpperCase()}</div>
            <span class="type-badge type-${j.type}">${j.type}</span>
          </div>
          <h3>${j.title}</h3>
          <div class="org-name">${j.org}</div>
          <div class="tags">${tags}</div>
          <div class="card-footer">
            <div class="footer-left">
              <div>📍 ${j.location}</div>
              <div class="deadline ${dl <= 7 ? 'urgent' : ''}">⏰ ${dl <= 0 ? 'Closing Today' : dl + ' days left'}</div>
            </div>
            <div class="stipend">${j.stipend}</div>
          </div>
        </div>
      `;
    }).join("");
  }

  function openModal(idx) {
    const j = allJobs[idx];
    const applyUrl = j.apply.toLowerCase().includes("http") ? j.apply : "https://" + j.apply;
    
    document.getElementById("modal-content").innerHTML = `
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2 style="margin-bottom:4px;">${j.title}</h2>
      <div style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">${j.org} • ${j.type}</div>
      
      <div style="margin-bottom:20px;">
        <label style="font-size:11px; font-weight:700; color:var(--text-faint); text-transform:uppercase;">Description</label>
        <p style="font-size:14px; margin-top:5px;">${j.desc}</p>
      </div>

      <div style="margin-bottom:20px;">
        <label style="font-size:11px; font-weight:700; color:var(--text-faint); text-transform:uppercase;">Eligibility</label>
        <p style="font-size:14px; margin-top:5px;">${j.eligibility}</p>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; background:var(--bg); padding:15px; border-radius:10px;">
        <div><small style="color:var(--text-faint);">Stipend</small><br><strong>${j.stipend}</strong></div>
        <div><small style="color:var(--text-faint);">Deadline</small><br><strong>${j.deadline}</strong></div>
      </div>

      <a href="${applyUrl}" target="_blank" class="apply-btn">Apply Now →</a>
    `;
    document.getElementById("modal").classList.add("open");
  }

  function closeModal() { document.getElementById("modal").classList.remove("open"); }
  
  // UI Event Listeners
  document.getElementById("search").addEventListener("input", e => { searchVal = e.target.value; render(); });
  document.getElementById("sort").addEventListener("change", e => { sortVal = e.target.value; render(); });
  document.querySelectorAll(".pill").forEach(p => p.addEventListener("click", () => {
    document.querySelector(".pill.active").classList.remove("active");
    p.classList.add("active");
    activeFilter = p.dataset.filter;
    render();
  }));

  // Initialize on load
  init();
</script>
