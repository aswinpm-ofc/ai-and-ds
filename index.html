<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CS Department Opportunities</title>
    </head>
<body>
    <script>
        const DATA_SOURCE = "jobs.json"; // Pointing to your local JSON file

        async function init() {
            try {
                const res = await fetch(DATA_SOURCE);
                if (!res.ok) throw new Error();
                const contentType = res.headers.get("content-type");
                
                if (DATA_SOURCE.endsWith(".json") || (contentType && contentType.includes("json"))) {
                    allJobs = await res.json();
                } else {
                    const text = await res.text();
                    allJobs = parseCSV(text);
                }
                render();
            } catch (e) {
                console.error("Data load error:", e);
            }
        }
        // ... [Include parseCSV and render functions here]
        init();
    </script>
</body>
</html>
